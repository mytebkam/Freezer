name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    # Обновили checkout до v4
    - uses: actions/checkout@v4

    # Обновили setup-python до v5
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter psutil pynput

    - name: Build with PyInstaller
      run: pyinstaller --noconsole --onefile freezer.py

    # Обновили upload-artifact до v4 (из-за которого была ошибка)
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: FREEZER-app
        path: dist/freezer.exe
