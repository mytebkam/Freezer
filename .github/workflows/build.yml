name: Build EXE

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller customtkinter psutil pynput

    - name: Build with PyInstaller
      run: pyinstaller --noconsole --onefile freezer.py

    - name: Upload Artifact
      uses: actions/upload-artifact@v3
      with:
        name: FREEZER-app
        path: dist/freezer.exe
